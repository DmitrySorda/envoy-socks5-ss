name: Build SOCKS5-SS Proxy

on:
  push:
    branches: [main, master, feature/standalone-proxy]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # Build standalone proxy - fast!
  build-linux:
    name: Build Linux (amd64)
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libssl-dev
    
    - name: Build SOCKS5-SS proxy
      run: |
        mkdir -p artifacts
        
        # Build standalone proxy
        g++ -std=c++17 -O3 -pthread \
          -I include \
          -o artifacts/socks5-ss-proxy \
          src/socks5_ss_proxy.cc \
          -lssl -lcrypto
        
        chmod +x artifacts/socks5-ss-proxy
        
        # Show binary info
        ls -la artifacts/
        file artifacts/socks5-ss-proxy
        ldd artifacts/socks5-ss-proxy || true
    
    - name: Run tests
      run: |
        # SOCKS5 parser test
        g++ -std=c++17 -I include test/standalone_test.cc -o standalone_test
        ./standalone_test
        echo "SOCKS5 parser test: PASSED"
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: socks5-ss-proxy-linux-amd64
        path: artifacts/
        retention-days: 30

  # Build for macOS  
  build-macos:
    name: Build macOS (arm64)
    runs-on: macos-14
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: brew install openssl@3
    
    - name: Build SOCKS5-SS proxy
      run: |
        mkdir -p artifacts
        
        # Build with Homebrew OpenSSL
        clang++ -std=c++17 -O3 -pthread \
          -I include \
          -I $(brew --prefix openssl@3)/include \
          -L $(brew --prefix openssl@3)/lib \
          -o artifacts/socks5-ss-proxy \
          src/socks5_ss_proxy.cc \
          -lssl -lcrypto
        
        chmod +x artifacts/socks5-ss-proxy
        ls -la artifacts/
    
    - name: Run tests
      run: |
        clang++ -std=c++17 -I include test/standalone_test.cc -o standalone_test
        ./standalone_test
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: socks5-ss-proxy-macos-arm64
        path: artifacts/
        retention-days: 30

  # macOS Intel
  build-macos-intel:
    name: Build macOS (x86_64)
    runs-on: macos-12
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: brew install openssl@3
    
    - name: Build SOCKS5-SS proxy
      run: |
        mkdir -p artifacts
        
        clang++ -std=c++17 -O3 -pthread \
          -I include \
          -I $(brew --prefix openssl@3)/include \
          -L $(brew --prefix openssl@3)/lib \
          -o artifacts/socks5-ss-proxy \
          src/socks5_ss_proxy.cc \
          -lssl -lcrypto
        
        chmod +x artifacts/socks5-ss-proxy
        ls -la artifacts/
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: socks5-ss-proxy-macos-x86_64
        path: artifacts/
        retention-days: 30

  # Docker
  docker:
    name: Build Docker Image
    runs-on: ubuntu-22.04
    needs: build-linux
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download binary
      uses: actions/download-artifact@v4
      with:
        name: socks5-ss-proxy-linux-amd64
        path: artifacts/
    
    - name: Create Dockerfile
      run: |
        cat > Dockerfile.standalone << 'EOF'
        FROM alpine:3.19
        
        RUN apk add --no-cache libssl3 libcrypto3 ca-certificates
        
        COPY artifacts/socks5-ss-proxy /usr/local/bin/
        
        EXPOSE 1080
        
        ENTRYPOINT ["/usr/local/bin/socks5-ss-proxy"]
        CMD ["--listen", "0.0.0.0:1080", "--keys", "/etc/socks5-ss/keys.json"]
        EOF
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile.standalone
        push: true
        tags: |
          ghcr.io/${{ github.repository }}:latest
          ghcr.io/${{ github.repository }}:standalone
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Release
  release:
    name: Create Release
    runs-on: ubuntu-22.04
    needs: [build-linux, build-macos, build-macos-intel]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
    
    - name: Create archives
      run: |
        cd socks5-ss-proxy-linux-amd64 && tar -czvf ../socks5-ss-proxy-linux-amd64.tar.gz . && cd ..
        cd socks5-ss-proxy-macos-arm64 && tar -czvf ../socks5-ss-proxy-macos-arm64.tar.gz . && cd ..
        cd socks5-ss-proxy-macos-x86_64 && tar -czvf ../socks5-ss-proxy-macos-x86_64.tar.gz . && cd ..
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          socks5-ss-proxy-linux-amd64.tar.gz
          socks5-ss-proxy-macos-arm64.tar.gz
          socks5-ss-proxy-macos-x86_64.tar.gz
        generate_release_notes: true
