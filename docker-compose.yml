version: '3.8'

services:
  envoy-socks5-ss:
    build: .
    image: envoy-socks5-ss:latest
    container_name: envoy-socks5-ss
    ports:
      - "1080:1080"   # SOCKS5 proxy
      - "9901:9901"   # Admin API
    volumes:
      - ./examples/envoy-socks5-ss.yaml:/etc/envoy/envoy.yaml:ro
      - ../gost-proxy/data/keys.json:/etc/envoy/keys.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9901/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Prometheus for metrics
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./examples/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    profiles:
      - monitoring
    depends_on:
      - envoy-socks5-ss

  # Optional: Grafana for dashboards
  grafana:
    image: grafana/grafana:10.1.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    profiles:
      - monitoring
    depends_on:
      - prometheus

volumes:
  grafana-data:
