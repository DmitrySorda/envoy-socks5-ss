# Prometheus configuration for SOCKS5-SS Envoy proxy
# This config scrapes metrics from Envoy instances

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alerting rules (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Rule files (optional)
rule_files: []

scrape_configs:
  # Envoy SOCKS5-SS metrics
  - job_name: 'envoy-socks5-ss'
    metrics_path: '/stats/prometheus'
    static_configs:
      - targets: ['envoy-socks5-ss:9901']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+):\d+'
        replacement: '${1}'
    metric_relabel_configs:
      # Keep only relevant metrics
      - source_labels: [__name__]
        regex: 'envoy_socks5_ss_.*|envoy_cluster_.*|envoy_server_.*|envoy_http_.*'
        action: keep

  # Multiple Envoy instances (if scaled)
  - job_name: 'envoy-instances'
    metrics_path: '/stats/prometheus'
    static_configs:
      - targets:
          - 'envoy-1:9901'
          - 'envoy-2:9901'
          - 'envoy-3:9901'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+):\d+'
        replacement: '${1}'

